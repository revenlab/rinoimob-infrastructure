version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: rinoimob-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pass}
      POSTGRES_DB: ${DB_NAME:-rinoimob}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - rinoimob-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-user} -d ${DB_NAME:-rinoimob} -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rinoimob-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - rinoimob-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: rinoimob-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - rinoimob-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  seaweedfs-master:
    image: chrislusf/seaweedfs:3.68
    container_name: rinoimob-seaweedfs-master
    command: "master -ip=seaweedfs-master -ip.bind=0.0.0.0 -mdir=/data"
    ports:
      - "${SEAWEEDFS_MASTER_PORT:-9333}:9333"
    volumes:
      - seaweedfs_master_data:/data
    networks:
      - rinoimob-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9333/cluster/status || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  seaweedfs-volume:
    image: chrislusf/seaweedfs:3.68
    container_name: rinoimob-seaweedfs-volume
    command: "volume -mserver=seaweedfs-master:9333 -ip.bind=0.0.0.0 -port=8080 -dir=/data -max=10"
    ports:
      - "${SEAWEEDFS_VOLUME_PORT:-8080}:8080"
    volumes:
      - seaweedfs_volume_data:/data
    networks:
      - rinoimob-network
    depends_on:
      seaweedfs-master:
        condition: service_healthy

  evolution-api:
    image: atendai/evolution-api:v2.2.3
    container_name: rinoimob-evolution-api
    restart: unless-stopped
    ports:
      - "${EVOLUTION_API_PORT:-8081}:8080"
    environment:
      SERVER_PORT: 8080
      SERVER_URL: ${EVOLUTION_API_EXTERNAL_URL:-http://localhost:8081}
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-changeme-evolution-apikey}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
      DATABASE_ENABLED: "false"
      RABBITMQ_ENABLED: "true"
      RABBITMQ_URI: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rinoimob-rabbitmq:5672
      RABBITMQ_EXCHANGE_NAME: evolution
      RABBITMQ_GLOBAL_ENABLED: "true"
      RABBITMQ_EVENTS_APPLICATION_STARTUP: "false"
      RABBITMQ_EVENTS_MESSAGES_UPSERT: "true"
      RABBITMQ_EVENTS_MESSAGES_UPDATE: "true"
      RABBITMQ_EVENTS_CONNECTION_UPDATE: "true"
      RABBITMQ_EVENTS_QRCODE_UPDATED: "true"
      DEL_INSTANCE: "false"
      LANGUAGE: pt-BR
    volumes:
      - evolution_data:/evolution/instances
    networks:
      - rinoimob-network
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  seaweedfs_master_data:
  seaweedfs_volume_data:
  evolution_data:

networks:
  rinoimob-network:
    driver: bridge
